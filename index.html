    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Recife Digital - Capacitação tecnológica acessível para todos em parceria com a Prefeitura do Recife e CESAR School." />
    <meta name="keywords" content="Recife Digital, Cursos Gratuitos, Acessibilidade, Libras, Informática Básica, Cidadania Digital, Programação, CESAR School, Prefeitura do Recife" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <title>Recife Digital | Plataforma de Cursos Acessíveis</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register Service Worker for PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.log('Erro ao registrar SW:', err));
        });
      }
    </script>
  </body>
